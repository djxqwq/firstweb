# Simple workflow for deploying VitePress to GitHub Pages
name: Deploy static content to Pages

# 触发条件：推送到main分支 或 手动触发
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 部署Pages需要的权限（固定写法）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：避免重复部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 配置Node.js环境（VitePress必须依赖Node）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装项目依赖（包括vitepress）
      - name: Install dependencies
        run: npm install

      # 4. 构建VitePress静态文件（核心步骤）
      - name: Build VitePress site
        run: npm run build

      # 5. 配置GitHub Pages环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. 上传构建后的产物（只传编译好的文件，不是源码）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist  # VitePress编译产物的路径

      # 7. 部署到GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
